    <!-- React Core -->

    <!-- Firebase SDK (Compat) -->

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        pits: {
                            dark: '#050b14',
                            panel: '#0d1522',
                            red: '#e11d48',     // Rojo mecánico/racing
                            cyan: '#06b6d4',    // Cian tecnológico
                            border: '#1e293b'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0, transform: 'translateY(10px)' },

    <style>
        body { background-color: #050b14; color: #f8fafc; overflow-x: hidden; }
        
        .glass-panel {
            background: rgba(13, 21, 34, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(30, 41, 59, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.8);
        }

        .bg-hero {
            background-image: linear-gradient(to right, #050b14 20%, rgba(5, 11, 20, 0.4) 100%), url('images3/portada.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Fallback background if local image is missing */
        .bg-hero-fallback {
            background-image: linear-gradient(to right, #050b14 20%, rgba(5, 11, 20, 0.4) 100%), url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?q=80&w=2000&auto=format&fit=crop');
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050b14; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Animación de carga (Typing) */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* Markdown formatting */
        .msg-content strong { color: #fff; font-weight: 700; }
        .msg-content ul { list-style-type: disc; margin-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
    </style>

<body class="antialiased selection:bg-pits-red selection:text-white">

    <div id="root" class="w-full min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURACIONES MAESTRAS
        // ==========================================
        
        // SOBERANO: Verifica tu API_URL del backend Python
        const API_URL = "https://pits-720f4041bb80.herokuapp.com/api/chat"; // Cámbialo a tu Heroku en producción
        
        // SOBERANO: Coloca aquí tu Firebase Config de Pits
        const firebaseConfig = {
            apiKey: "AIzaSyDNSg33pfmXx4yPdsr_u6-tX7pukAQbvn4", 
            authDomain: "pits-382a0.firebaseapp.com",
            projectId: "pits-382a0",
            storageBucket: "pits-382a0.firebasestorage.app",
            messagingSenderId: "828002449733",
            appId: "1:828002449733:web:69a5738bab59a3c52ce62c"
        };

        let auth = null;
        let isFirebaseActive = false;

        try {
            if (firebaseConfig.apiKey !== "PON_TU_API_KEY_AQUI") {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                isFirebaseActive = true;
            }
        } catch (e) { console.error("Error Firebase:", e); }

        // ==========================================
        // COMPONENTE: PANTALLA DE LOGIN / LANDING
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [role, setRole] = useState('mechanic'); // 'mechanic' o 'owner'
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                try {
                    if (isFirebaseActive && auth) {
                        const userCredential = await auth.signInWithEmailAndPassword(email, password);
                        onLoginSuccess(userCredential.user, role);
                    } else {
                        // MODO DEMO: Simula el login si no hay Firebase configurado
                        setTimeout(() => {
                            if(email) onLoginSuccess({ email }, role);
                            else setError("Ingrese un correo válido.");
                            setLoading(false);
                        }, 1000);
                    }
                } catch (err) {
                    setError("Credenciales inválidas. " + err.message);
                    setLoading(false);
                }
            };

            return (
                <div className="flex-1 flex bg-pits-dark relative overflow-hidden bg-hero-fallback bg-hero">
                    {/* Capa de Oscurecimiento */}
                    <div className="absolute inset-0 bg-gradient-to-r from-pits-dark via-pits-dark/90 to-transparent"></div>

                    <div className="relative z-10 w-full max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row items-center justify-between gap-12">
                        
                        {/* Lado Izquierdo: Branding y Copy */}
                        <div className="w-full md:w-1/2 animate-fade-in">
                            <div className="flex items-center gap-3 mb-8">
                                <img src="images3/A Mark Small.png" alt="Logo" className="w-12 h-12" onError={(e) => e.target.style.display='none'} />
                                <h1 className="font-display font-black text-3xl tracking-widest text-white">INFINITI <span className="text-pits-red">PITS</span></h1>
                            </div>
                            
                            <h2 className="text-4xl md:text-6xl font-bold leading-tight text-white mb-6">
                                El Cerebro de tu <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-pits-red to-orange-500">Taller Mecánico.</span>
                            </h2>
                            
                            <p className="text-lg text-slate-400 mb-8 max-w-md leading-relaxed">
                                Deja de perder tiempo buscando manuales. Nuestro Ingeniero Jefe con IA te da torques exactos, diagramas y diagnósticos OBD-2 en segundos.
                            </p>

                            <div className="flex items-center gap-4 text-sm font-mono text-slate-500">
                                <span className="flex items-center gap-2"><i className="ph-fill ph-check-circle text-pits-red"></i> ALLDATA Incluido</span>
                                <span className="flex items-center gap-2"><i className="ph-fill ph-check-circle text-pits-red"></i> Manuales Europeos</span>
                            </div>
                        </div>

                        {/* Lado Derecho: Panel de Login */}
                        <div className="w-full md:w-5/12 animate-fade-in" style={{animationDelay: '0.2s'}}>
                            <div className="glass-panel p-8 rounded-3xl shadow-2xl">
                                <div className="text-center mb-8">
                                    <h3 className="text-2xl font-bold text-white">Acceso al Sistema</h3>
                                    <p className="text-sm text-slate-400 mt-2">Selecciona tu perfil operativo</p>
                                </div>

                                {/* SELECTOR DE ROL */}
                                <div className="flex p-1 bg-black/50 rounded-xl mb-6 border border-pits-border relative">
                                    <button 
                                        type="button" 
                                        onClick={() => setRole('owner')}
                                        className={`flex-1 py-3 text-sm font-bold rounded-lg transition-all duration-300 z-10 flex items-center justify-center gap-2 ${role === 'owner' ? 'bg-pits-cyan text-pits-dark shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        <i className="ph-fill ph-car-profile text-lg"></i> Dueño de Auto
                                    </button>
                                    <button 
                                        type="button" 
                                        onClick={() => setRole('mechanic')}
                                        className={`flex-1 py-3 text-sm font-bold rounded-lg transition-all duration-300 z-10 flex items-center justify-center gap-2 ${role === 'mechanic' ? 'bg-pits-red text-white shadow-[0_0_15px_rgba(225,29,72,0.4)]' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        <i className="ph-fill ph-wrench text-lg"></i> Taller Mecánico
                                    </button>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Correo Electrónico</label>
                                        <div className="relative">
                                            <i className="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                            <input 
                                                type="email" required value={email} onChange={e=>setEmail(e.target.value)} 
                                                className="w-full bg-pits-dark border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-red transition"
                                                placeholder="taller@ejemplo.com"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Contraseña</label>
                                        <div className="relative">
                                            <i className="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                                            <input 
                                                type="password" required value={password} onChange={e=>setPassword(e.target.value)} 
                                                className="w-full bg-pits-dark border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-red transition"
                                                placeholder="••••••••"
                                            />
                                        </div>
                                    </div>

                                    {error && <div className="p-3 bg-red-900/30 border border-red-500/50 rounded-lg text-xs text-red-400 text-center">{error}</div>}

                                    <button disabled={loading} type="submit" className={`w-full py-4 text-white font-bold rounded-xl shadow-lg transition transform hover:-translate-y-1 disabled:opacity-50 flex items-center justify-center gap-2 ${role === 'mechanic' ? 'bg-pits-red hover:bg-rose-700 shadow-pits-red/30' : 'bg-pits-cyan text-pits-dark hover:bg-cyan-400 shadow-pits-cyan/30'}`}>
                                        {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : <i className="ph-bold ph-sign-in text-xl"></i>}
                                        {loading ? "VERIFICANDO..." : "INGRESAR AL SISTEMA"}
                                    </button>
                                </form>
                                
                                <p className="text-center text-xs text-slate-500 mt-6">Protegido por Infiniti Security Matrix</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMPONENTE: CONSOLA DE DIAGNÓSTICO (CHAT)
        // ==========================================
        const ChatInterface = ({ user, role, onLogout }) => {
            
            // Textos y colores adaptados al rol
            const isMechanic = role === 'mechanic';
            const themeColor = isMechanic ? 'pits-red' : 'pits-cyan';
            const welcomeMsg = isMechanic 
                ? `Sistemas en línea, Colega.\nAcceso total a manuales europeos (ISTA, ElsaWin, WIS) y ALLDATA. Solicita torques, códigos DTC o diagramas exactos.`
                : `¡Hola! Soy la IA de Infiniti Pits.\nComo dueño del vehículo, estoy aquí para explicarte de forma sencilla el mantenimiento, averías o qué decirle a tu taller. ¿Qué le duele a tu auto hoy?`;

            const [messages, setMessages] = useState([{ role: 'ai', content: welcomeMsg }]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const bottomRef = useRef(null);

            useEffect(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), [messages]);

            const sendMessage = async () => {
                if (!input.trim()) return;
                
                const newMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, newMsg]);
                setInput("");
                setLoading(true);

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: newMsg.content,
                            user_type: role, // EL CÓDIGO MAESTRO DE ROL
                            history: messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }))
                        })
                    });

                    if (!response.ok) throw new Error("Error en la matriz del servidor.");

                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'ai', content: data.response }]);

                } catch (error) {
                    console.error(error);
                    setMessages(prev => [...prev, { role: 'ai', content: `⚠️ **Error de conexión:** No me pude comunicar con el servidor central. Verifica que el backend esté activo.` }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex-1 flex flex-col h-screen bg-pits-dark animate-fade-in relative">
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10 pointer-events-none"></div>
                    
                    {/* HEADER */}
                    <header className={`h-16 md:h-20 glass-panel border-b border-${themeColor}/30 flex items-center justify-between px-6 relative z-20 shrink-0`}>
                        <div className="flex items-center gap-3 md:gap-4">
                            <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full bg-${themeColor} flex items-center justify-center shadow-[0_0_15px_rgba(${isMechanic ? '225,29,72' : '6,182,212'},0.5)]`}>
                                <i className={`ph-fill ${isMechanic ? 'ph-engine' : 'ph-car-profile'} ${isMechanic ? 'text-white' : 'text-pits-dark'} text-2xl`}></i>
                            </div>
                            <div>
                                <h1 className={`font-display font-bold text-lg md:text-xl tracking-wider text-white`}>
                                    INFINITI <span className={`text-${themeColor}`}>PITS</span>
                                </h1>
                                <p className={`text-[10px] md:text-xs font-mono uppercase tracking-widest text-${themeColor}`}>
                                    {isMechanic ? 'Terminal Profesional' : 'Asistencia Propietario'}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex flex-col text-right">
                                <span className="text-xs text-white font-bold">{user.email}</span>
                                <span className="text-[10px] text-green-400 font-mono"><i className="ph-fill ph-circle"></i> ONLINE</span>
                            </div>
                            <button onClick={onLogout} className="text-slate-400 hover:text-white transition w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/50 hover:bg-slate-700" title="Cerrar Sesión">
                                <i className="ph ph-sign-out text-xl"></i>
                            </button>
                        </div>
                    </header>

                    {/* ÁREA DE CHAT */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 relative z-10">
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex gap-4 max-w-4xl mx-auto ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                
                                <div className={`w-10 h-10 rounded-full shrink-0 flex items-center justify-center shadow-lg ${msg.role === 'user' ? 'bg-slate-700 text-white' : `bg-${themeColor} ${isMechanic ? 'text-white' : 'text-pits-dark'} shadow-[0_0_15px_rgba(${isMechanic ? '225,29,72' : '6,182,212'},0.4)]`}`}>
                                    <i className={`ph-fill ${msg.role === 'user' ? 'ph-user' : 'ph-robot'} text-xl`}></i>
                                </div>
                                
                                <div className={`msg-content p-5 rounded-2xl text-sm md:text-base leading-relaxed ${
                                    msg.role === 'user' 
                                    ? `bg-slate-800 text-white rounded-tr-none border border-slate-700` 
                                    : `glass-panel text-slate-200 rounded-tl-none border-l-2 border-l-${themeColor}`
                                }`}>
                                    <div dangerouslySetInnerHTML={{ __html: msg.content.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") }}></div>
                                </div>

                            </div>
                        ))}

                        {loading && (
                            <div className="flex gap-4 max-w-4xl mx-auto">
                                <div className={`w-10 h-10 rounded-full shrink-0 flex items-center justify-center shadow-lg opacity-50 bg-${themeColor} ${isMechanic ? 'text-white' : 'text-pits-dark'}`}>
                                    <i className="ph-fill ph-robot text-xl"></i>
                                </div>
                                <div className={`glass-panel px-5 py-4 rounded-2xl rounded-tl-none flex items-center gap-2 border-l-2 border-l-${themeColor}`}>
                                    <div className={`w-2 h-2 rounded-full bg-${themeColor} typing-dot`}></div>
                                    <div className={`w-2 h-2 rounded-full bg-${themeColor} typing-dot`}></div>
                                    <div className={`w-2 h-2 rounded-full bg-${themeColor} typing-dot`}></div>
                                </div>
                            </div>
                        )}
                        <div ref={bottomRef}></div>
                    </main>

                    {/* INPUT AREA */}
                    <footer className="glass-panel p-4 md:p-6 border-t border-pits-border relative z-20 shrink-0">
                        <div className="max-w-4xl mx-auto relative flex items-end gap-3 bg-black/60 border border-slate-700/50 rounded-2xl p-2 focus-within:border-slate-500 transition-colors shadow-inner">
                            <textarea 
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                                rows="1" 
                                className="w-full bg-transparent text-white outline-none resize-none p-3 max-h-32 text-sm md:text-base font-sans" 
                                placeholder={isMechanic ? "Ej: Torque de culata para BMW 328i 2018..." : "Ej: Mi carro vibra al frenar, ¿qué puede ser?"}
                                disabled={loading}
                            ></textarea>
                            <button 
                                onClick={sendMessage}
                                disabled={loading || !input.trim()}
                                className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all shadow-lg hover:scale-105 shrink-0 mb-1 mr-1 disabled:opacity-50 disabled:hover:scale-100 ${isMechanic ? 'bg-pits-red text-white hover:bg-rose-600' : 'bg-pits-cyan text-pits-dark hover:bg-cyan-400'}`}
                            >
                                <i className="ph-bold ph-paper-plane-right text-xl"></i>
                            </button>
                        </div>
                        <p className="text-center text-[10px] text-slate-500 mt-3 font-mono uppercase tracking-widest">Infiniti Pits OS &copy; 2026</p>
                    </footer>
                </div>
            );
        };

        // ==========================================
        // APP PRINCIPAL (ENRUTADOR DE ESTADO)
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('mechanic');

            // Efecto de Auto-Login si hay sesión guardada en Firebase
            useEffect(() => {
                if (isFirebaseActive && auth) {
                    const unsubscribe = auth.onAuthStateChanged((u) => {
                        if (u) {
                            // En un sistema real, el rol podría venir de Firestore. 
                            // Aquí usamos localStorage para mantener la selección de la sesión.
                            const savedRole = localStorage.getItem('infiniti_pits_role') || 'mechanic';
                            setRole(savedRole);
                            setUser(u);
                        } else {
                            setUser(null);
                        }
                    });
                    return () => unsubscribe();
                }
            }, []);

            const handleLoginSuccess = (userData, selectedRole) => {
                localStorage.setItem('infiniti_pits_role', selectedRole);
                setRole(selectedRole);
                setUser(userData);
            };

            const handleLogout = async () => {
                if (isFirebaseActive && auth) await auth.signOut();
                localStorage.removeItem('infiniti_pits_role');
                setUser(null);
            };

            return (
                <React.Fragment>
                    {!user ? (
                        <LoginScreen onLoginSuccess={handleLoginSuccess} />
                    ) : (
                        <ChatInterface user={user} role={role} onLogout={handleLogout} />
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
