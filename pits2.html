<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>INFINITI PITS | Database de Diagramas Profesionales</title>
    <meta name="description" content="Estación de mando automotriz. Diagramas eléctricos, cadenas de tiempo y manuales de taller.">
    
    <!-- Librerías de Diseño e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        pits: {
                            dark: '#030508',     
                            panel: '#0a0f18',    
                            primary: '#ef4444',  
                            cyan: '#06b6d4',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
        marked.setOptions({ breaks: true });
    </script>

    <style>
        body { background-color: #030508; color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 3px; }
        
        .glass-panel {
            background: rgba(10, 15, 24, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body strong { color: #ffffff; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
        .markdown-body img { display: none !important; } /* Ocultamos imgs en el texto por seguridad */

        /* Fondo de los diagramas técnicos (Estilo Papel) */
        .diagram-bg {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .hud-scanline {
            width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(6, 182, 212, 0.8), transparent);
            position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none;
            animation: scanline 2s linear infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased selection:bg-pits-cyan selection:text-pits-dark">

    <div id="root" class="h-screen flex flex-col relative z-10"></div>
    
    <!-- Malla de fondo sutil -->
    <div class="fixed inset-0 pointer-events-none z-0" style="background-image: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 1px, transparent 1px); background-size: 30px 30px;"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ⚠️ SOBERANO: URL DE TU BACKEND EN HEROKU 
        const API_URL = "https://abunda-bca693eb3dbb.herokuapp.com/api/chat";

        // ==========================================
        // PANTALLA DE LOGIN (SOLO MECÁNICOS)
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                // Simulación de Login (o aquí va Firebase si lo habilitas)
                setTimeout(() => onLoginSuccess(), 1000);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-10">
                    <div className="glass-panel p-8 md:p-12 rounded-[2rem] w-full max-w-md relative z-10 shadow-[0_0_50px_rgba(6,182,212,0.15)] border-t-2 border-t-pits-cyan text-center">
                        <div className="w-20 h-20 bg-pits-dark border border-pits-cyan/50 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                            <i className="ph-fill ph-blueprint text-4xl text-pits-cyan"></i>
                        </div>
                        <h1 className="text-3xl font-display font-bold tracking-tight mb-2 text-white">INFINITI PITS</h1>
                        <p className="text-pits-cyan text-[10px] font-mono tracking-widest uppercase font-bold mb-8">Portal Exclusivo para Talleres</p>

                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="relative">
                                <i className="ph-fill ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-pits-dark/80 border border-pits-border rounded-xl py-4 pl-12 pr-4 text-white font-mono text-sm focus:outline-none focus:border-pits-cyan transition" placeholder="ID de Taller (Email)" />
                            </div>
                            <div className="relative">
                                <i className="ph-fill ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-pits-dark/80 border border-pits-border rounded-xl py-4 pl-12 pr-4 text-white font-mono text-sm focus:outline-none focus:border-pits-cyan transition" placeholder="Clave de Acceso" />
                            </div>
                            <button disabled={loading} type="submit" className="w-full py-4 bg-pits-cyan text-pits-dark font-bold rounded-xl hover:bg-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.3)] transition transform hover:-translate-y-1 disabled:opacity-50 uppercase tracking-widest text-sm">
                                {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : "Conectar Base de Datos"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ESTACIÓN DE MANDO (CHAT 40% + DIAGRAMA 60%)
        // ==========================================
        const CommandStation = ({ onLogout }) => {
            const [messages, setMessages] = useState([
                { role: 'ai', content: 'Enlace establecido. **Ingeniero Jefe PITS** en línea.\nTengo acceso a manuales ALLDATA, torques, diagramas eléctricos y sincronización de tiempo.\n\nIndícame el modelo y el diagrama que necesitas.' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            // Monitor Visual (Solo Diagrama)
            const [diagramUrl, setDiagramUrl] = useState('');
            const [lightboxImg, setLightboxImg] = useState(null); 

            const messagesEndRef = useRef(null);
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const userText = input;
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setInput('');
                setIsLoading(true);

                // Iniciando radar de carga en el monitor derecho
                setDiagramUrl('loading');

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: userText,
                            history: messages.map(m => ({ role: m.role, content: m.content })) 
                        })
                    });

                    if (!response.ok) throw new Error('Error de red');
                    
                    const data = await response.json();
                    let aiText = data.response || "Error de decodificación.";

                    // ==========================================
                    // 💡 EL INTERCEPTOR CUÁNTICO FRONTEND
                    // Busca la etiqueta enviada por tu `main.py`
                    // ==========================================
                    const diagramRegex = /\[DIAGRAMA:\s*(.*?)\]/i;
                    const match = aiText.match(diagramRegex);
                    
                    if (match && match[1]) {
                        // 1. Establecemos la imagen en el monitor derecho
                        setDiagramUrl(match[1].trim());
                        // 2. Borramos la etiqueta del texto para que el chat quede limpio
                        aiText = aiText.replace(diagramRegex, '').trim(); 
                    } else {
                        // Si la IA no mandó la etiqueta, limpiamos el monitor o lo dejamos vacío
                        if(diagramUrl === 'loading') setDiagramUrl('');
                    }

                    // Actualizamos el chat con la respuesta limpia
                    setMessages(prev => [...prev, { role: 'ai', content: aiText }]);

                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: "⚠️ Conexión perdida con el servidor central." }]);
                    setDiagramUrl(''); 
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen relative overflow-hidden z-10">
                    
                    {/* VISOR PANTALLA COMPLETA (LIGHTBOX) PARA DIAGRAMAS */}
                    {lightboxImg && (
                        <div className="fixed inset-0 z-[100] bg-pits-dark/95 backdrop-blur-xl flex items-center justify-center p-4 cursor-zoom-out animate-[fadeIn_0.3s_ease-out]" onClick={() => setLightboxImg(null)}>
                            <button className="absolute top-6 right-6 text-slate-400 hover:text-white bg-pits-panel border border-slate-700 p-3 rounded-full transition z-50">
                                <i className="ph-bold ph-x text-xl"></i>
                            </button>
                            {/* El fondo del lightbox es blanco roto para simular papel impreso */}
                            <img src={lightboxImg} alt="Plano Ampliado" className="max-w-full max-h-[90vh] object-contain rounded border-4 border-white shadow-[0_0_50px_rgba(6,182,212,0.15)] bg-slate-50 p-2" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}

                    {/* HEADER TÁCTICO */}
                    <header className="glass-panel border-b-0 border-pits-border p-3 flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-pits-cyan/10 border border-pits-cyan/50 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                                <i className="ph-fill ph-blueprint text-pits-cyan text-xl"></i>
                            </div>
                            <div>
                                <h1 className="font-display font-bold text-lg leading-none uppercase tracking-widest text-white mb-1">Infiniti Pits</h1>
                                <div className="flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-pits-cyan animate-pulse"></span>
                                    <span className="text-[10px] text-pits-cyan font-mono tracking-widest uppercase">Professional Terminal</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onLogout} className="px-4 py-2 rounded-lg bg-pits-panel border border-pits-border text-gray-400 hover:text-white hover:border-pits-primary transition flex items-center gap-2 font-mono text-xs uppercase tracking-widest">
                            <span className="hidden sm:inline">Desconectar</span> <i className="ph-bold ph-sign-out text-lg"></i>
                        </button>
                    </header>

                    {/* MAIN LAYOUT (2 ESPACIOS: CHAT 40% | DIAGRAMA 60%) */}
                    <div className="flex-1 flex flex-col lg:flex-row w-full overflow-hidden p-3 gap-4">
                        
                        {/* 1. EL CHAT (Izquierda) */}
                        <div className="w-full lg:w-[40%] flex flex-col glass-panel rounded-2xl border border-pits-border shadow-2xl overflow-hidden shrink-0 h-[50vh] lg:h-full">
                            <div className="bg-pits-panel/80 p-3 border-b border-pits-border flex justify-between items-center shrink-0">
                                <span className="font-mono text-[10px] text-gray-400 tracking-widest uppercase flex items-center gap-2"><i className="ph-fill ph-terminal-window text-pits-cyan"></i> Asistente de Taller</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`flex gap-3 max-w-[95%] ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div className="flex-shrink-0 mt-1">
                                                {msg.role === 'ai' ? (
                                                    <div className="w-8 h-8 rounded-xl bg-pits-cyan/10 border border-pits-cyan/30 flex items-center justify-center text-pits-cyan shadow-[0_0_10px_rgba(6,182,212,0.2)]"><i className="ph-fill ph-robot"></i></div>
                                                ) : (
                                                    <div className="w-8 h-8 rounded-xl bg-slate-800 border border-slate-600 flex items-center justify-center text-white"><i className="ph-fill ph-wrench"></i></div>
                                                )}
                                            </div>
                                            <div className={`p-4 md:p-5 rounded-2xl text-sm leading-relaxed shadow-lg markdown-body ${msg.role === 'user' ? 'bg-pits-panel border border-slate-700 text-white rounded-tr-none' : 'bg-black/60 border border-pits-cyan/20 text-slate-200 rounded-tl-none'}`} dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}></div>
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start">
                                        <div className="flex gap-3 max-w-[75%]">
                                            <div className="w-8 h-8 rounded-xl bg-pits-cyan/10 border border-pits-cyan/30 flex items-center justify-center text-pits-cyan mt-1"><i className="ph-fill ph-robot"></i></div>
                                            <div className="p-4 rounded-2xl rounded-tl-none bg-black/60 border border-pits-cyan/20 flex items-center gap-3">
                                                <i className="ph-bold ph-circle-notch animate-spin text-pits-cyan text-lg"></i>
                                                <span className="text-xs text-gray-400 font-mono tracking-widest uppercase">Analizando Parámetros...</span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 md:p-4 bg-pits-panel border-t border-pits-border shrink-0">
                                <div className="relative flex gap-2">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Pide un diagrama, torque o código DTC..." className="w-full bg-pits-dark border border-pits-border rounded-xl px-4 py-4 text-sm text-white focus:outline-none focus:border-pits-cyan transition font-mono placeholder:text-slate-600" disabled={isLoading} autoComplete="off" />
                                    <button onClick={handleSend} disabled={!input.trim() || isLoading} className="w-14 bg-pits-cyan text-pits-dark rounded-xl flex items-center justify-center hover:bg-cyan-400 transition disabled:opacity-50 shadow-[0_0_15px_rgba(6,182,212,0.3)] shrink-0"><i className="ph-bold ph-paper-plane-right text-xl"></i></button>
                                </div>
                            </div>
                        </div>

                        {/* 2. EL MONITOR DE DIAGRAMAS (Derecha) */}
                        <div className="w-full lg:w-[60%] flex flex-col h-[50vh] lg:h-full shrink-0">
                            
                            <div className="flex-1 glass-panel rounded-2xl border border-pits-cyan/30 flex flex-col overflow-hidden relative shadow-[0_0_30px_rgba(6,182,212,0.05)]">
                                
                                <div className="bg-pits-panel p-3 border-b border-pits-border flex justify-between items-center z-10 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <i className="ph-fill ph-file-text text-pits-cyan text-lg"></i>
                                        <span className="font-mono text-[10px] text-pits-cyan tracking-widest uppercase font-bold">Monitor de Mapas y Diagramas</span>
                                    </div>
                                    <button onClick={() => { if(diagramUrl && diagramUrl !== 'loading') setLightboxImg(diagramUrl); }} className="text-[10px] bg-slate-800 hover:bg-slate-700 text-white font-mono px-3 py-1.5 rounded transition flex items-center gap-2 uppercase tracking-widest" disabled={!diagramUrl || diagramUrl === 'loading'}>
                                        <i className="ph-bold ph-arrows-out-simple"></i> Ampliar
                                    </button>
                                </div>
                                
                                {/* Contenedor visual del diagrama */}
                                <div className="flex-1 relative diagram-bg flex items-center justify-center overflow-hidden p-4">
                                    
                                    {diagramUrl === '' && (
                                        <div className="text-center text-slate-500 font-mono flex flex-col items-center">
                                            <div className="w-20 h-20 border-2 border-dashed border-slate-600 rounded-full flex items-center justify-center mb-4">
                                                <i className="ph-thin ph-magnifying-glass text-4xl"></i>
                                            </div>
                                            <span className="text-xs uppercase tracking-widest">Esperando Petición</span>
                                        </div>
                                    )}
                                    
                                    {diagramUrl === 'loading' && (
                                        <>
                                            <div className="absolute inset-0 hud-scanline"></div>
                                            <div className="text-pits-cyan font-mono text-xs flex flex-col items-center z-10">
                                                <i className="ph-bold ph-scan animate-spin text-4xl mb-4"></i>
                                                <span className="animate-pulse tracking-[0.2em] bg-pits-dark/80 px-4 py-2 rounded">Extrayendo Plano Técnico...</span>
                                            </div>
                                        </>
                                    )}
                                    
                                    {diagramUrl && diagramUrl !== 'loading' && (
                                        <div className="w-full h-full bg-white rounded-lg shadow-2xl border-2 border-slate-300 p-2 overflow-hidden flex items-center justify-center relative group cursor-zoom-in" onClick={() => setLightboxImg(diagramUrl)}>
                                            <img src={diagramUrl} alt="Diagrama Técnico" className="max-w-full max-h-full object-contain mix-blend-multiply hover:scale-[1.02] transition-transform duration-300" />
                                            <div className="absolute bottom-4 right-4 bg-pits-dark/90 text-white text-[10px] font-mono px-3 py-1.5 rounded border border-pits-cyan/30 opacity-0 group-hover:opacity-100 transition-opacity">
                                                Click para ampliar
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLogged, setIsLogged] = useState(false);
            return (
                <React.Fragment>
                    {!isLogged ? <LoginScreen onLoginSuccess={() => setIsLogged(true)} /> : <CommandStation onLogout={() => setIsLogged(false)} />}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
