<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITI PITS | Dual Render Terminal</title>
    
    <!-- Librerías de Diseño e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Librería Mermaid.js (El Motor de Diagramas) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        pits: {
                            dark: '#030508',     
                            panel: '#0a0f18',    
                            primary: '#ef4444',  
                            cyan: '#06b6d4',
                            gold: '#fbbf24',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
        
        // Inicializar librerías
        marked.setOptions({ breaks: true });
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
    </script>

    <style>
        body { background-color: #030508; color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 3px; }
        
        .glass-panel {
            background: rgba(10, 15, 24, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body strong { color: #ffffff; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
        .markdown-body img { display: none !important; }

        .diagram-bg {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .mermaid-bg {
            background-color: #0a0f18;
            background-image: radial-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .hud-scanline {
            width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(6, 182, 212, 0.8), transparent);
            position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none;
            animation: scanline 2s linear infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased selection:bg-pits-cyan selection:text-pits-dark">

    <div id="root" class="h-screen flex flex-col relative z-10"></div>
    <div class="fixed inset-0 pointer-events-none z-0" style="background-image: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 1px, transparent 1px); background-size: 30px 30px;"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // URL del Backend de Heroku
        const API_URL = "https://abunda-bca693eb3dbb.herokuapp.com/api/chat";

        // ==========================================
        // BASE DE DATOS LOCAL (SISTEMA INVICTUS)
        // ==========================================
        
        // 1. Planos Físicos (Base64)
        const DB_BASE64 = {
            "tiempo": "TU_CODIGO_BASE64_PARA_TIEMPO_AQUI", // Soberano: Reemplaza con tus códigos
            "electrico": "TU_CODIGO_BASE64_PARA_ELECTRICO_AQUI",
            "default": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="
        };

        // 2. Diagramas Lógicos (Mermaid)
        const DB_MERMAID = {
            "diagnostico": `
                graph TD
                    A[Falla de Encendido] --> B{¿Hay chispa?}
                    B -->|Sí| C[Revisar Presión Combustible]
                    B -->|No| D[Verificar Bobinas de Encendido]
                    C -->|Baja| E[Cambiar Bomba/Filtro]
                    C -->|Normal| F[Revisar Inyectores]
                    D -->|Falla| G[Reemplazar Bobinas/Bujías]
                    D -->|Normal| H[Revisar Cableado/ECU]
                    
                    style A fill:#ef4444,stroke:#fff,stroke-width:2px,color:#fff
                    style B fill:#f59e0b,stroke:#fff,stroke-width:2px,color:#000
                    style E fill:#10b981,stroke:#fff,stroke-width:2px,color:#fff
                    style G fill:#10b981,stroke:#fff,stroke-width:2px,color:#fff
            `
        };

        const formatBase64 = (rawString) => {
            if (!rawString) return '';
            const cleanStr = rawString.trim().replace(/\s/g, ''); 
            if (cleanStr.startsWith('http')) return cleanStr; 
            if (cleanStr.startsWith('data:image')) return cleanStr; 
            return `data:image/jpeg;base64,${cleanStr}`; 
        };

        // ==========================================
        // PANTALLA DE LOGIN
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => onLoginSuccess(), 1000);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-10">
                    <div className="glass-panel p-8 md:p-12 rounded-[2rem] w-full max-w-md relative z-10 shadow-[0_0_50px_rgba(6,182,212,0.15)] border-t-2 border-t-pits-cyan text-center">
                        <div className="w-20 h-20 bg-pits-dark border border-pits-cyan/50 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                            <i className="ph-fill ph-cpu text-4xl text-pits-cyan"></i>
                        </div>
                        <h1 className="text-3xl font-display font-bold tracking-tight mb-2 text-white">INFINITI PITS</h1>
                        <p className="text-pits-cyan text-[10px] font-mono tracking-widest uppercase font-bold mb-8">Dual Render Terminal</p>

                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="relative">
                                <i className="ph-fill ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-pits-dark/80 border border-pits-border rounded-xl py-4 pl-12 pr-4 text-white font-mono text-sm focus:outline-none focus:border-pits-cyan transition" placeholder="ID de Taller (Email)" />
                            </div>
                            <div className="relative">
                                <i className="ph-fill ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-pits-dark/80 border border-pits-border rounded-xl py-4 pl-12 pr-4 text-white font-mono text-sm focus:outline-none focus:border-pits-cyan transition" placeholder="Clave de Acceso" />
                            </div>
                            <button disabled={loading} type="submit" className="w-full py-4 bg-pits-cyan text-pits-dark font-bold rounded-xl hover:bg-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.3)] transition transform hover:-translate-y-1 disabled:opacity-50 uppercase tracking-widest text-sm">
                                {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : "Conectar Base de Datos"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMPONENTE: RENDERIZADOR DE MERMAID
        // ==========================================
        const MermaidViewer = ({ code }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && code) {
                    try {
                        // Limpiamos el contenedor
                        containerRef.current.innerHTML = `<div class="mermaid">${code}</div>`;
                        // Forzamos a Mermaid a procesar el código
                        mermaid.init(undefined, containerRef.current.querySelectorAll('.mermaid'));
                    } catch (e) {
                        console.error("Error renderizando Mermaid:", e);
                    }
                }
            }, [code]);

            return (
                <div 
                    ref={containerRef} 
                    className="w-full h-full flex items-center justify-center overflow-auto p-4 cursor-grab active:cursor-grabbing hover:scale-[1.02] transition-transform duration-300"
                ></div>
            );
        };

        // ==========================================
        // ESTACIÓN DE MANDO (CHAT + DUAL MONITOR)
        // ==========================================
        const CommandStation = ({ onLogout }) => {
            const [messages, setMessages] = useState([
                { role: 'ai', content: 'Enlace establecido. **Ingeniero Jefe PITS** en línea.\nTengo capacidad de Dual Render. Pídeme un plano físico (Diagrama Eléctrico) o un árbol lógico (Flujo de Diagnóstico).' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            // Estado del Monitor
            const [viewType, setViewType] = useState('idle'); // idle, loading, base64, mermaid
            const [viewData, setViewData] = useState('');
            const [lightboxImg, setLightboxImg] = useState(null); 

            const messagesEndRef = useRef(null);
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const userText = input;
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setInput('');
                setIsLoading(true);
                setViewType('loading');

                // 💡 INTERCEPTOR MACHINE LEARNING (Local Fallbacks)
                let determinedType = 'base64';
                let dataToRender = DB_BASE64.default;
                
                const textLower = userText.toLowerCase();
                
                // Clasificación de la intención
                if (textLower.match(/flujo|diagnostico|pasos|arbol|mermaid/)) {
                    determinedType = 'mermaid';
                    dataToRender = DB_MERMAID.diagnostico;
                } else if (textLower.match(/tiempo|distribucion|cadena/)) {
                    determinedType = 'base64';
                    dataToRender = DB_BASE64.tiempo;
                } else if (textLower.match(/electrico|ecu|cableado/)) {
                    determinedType = 'base64';
                    dataToRender = DB_BASE64.electrico;
                }

                try {
                    // Petición a Heroku
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: userText,
                            history: messages.map(m => ({ role: m.role, content: m.content })) 
                        })
                    });

                    if (!response.ok) throw new Error('Error de red');
                    
                    const data = await response.json();
                    let aiText = data.response || "Error de decodificación.";

                    // Extracción Dinámica desde la respuesta de la IA
                    
                    // 1. Busca código Mermaid en la respuesta
                    const mermaidMatch = aiText.match(/```mermaid\n([\s\S]*?)```/i);
                    // 2. Busca etiqueta de imagen Base64
                    const base64Match = aiText.match(/\[DIAGRAMA:\s*(.*?)\]/i);

                    if (mermaidMatch && mermaidMatch[1]) {
                        determinedType = 'mermaid';
                        dataToRender = mermaidMatch[1].trim();
                        aiText = aiText.replace(/```mermaid\n[\s\S]*?```/i, '').trim();
                    } else if (base64Match && base64Match[1]) {
                        determinedType = 'base64';
                        dataToRender = base64Match[1].trim();
                        aiText = aiText.replace(/\[DIAGRAMA:.*?\]/i, '').trim();
                    }

                    // Limpieza final de basura Markdown
                    aiText = aiText.replace(/!\[.*?\]\(.*?\)/g, ''); 

                    setMessages(prev => [...prev, { role: 'ai', content: aiText.trim() }]);
                    setViewType(determinedType);
                    setViewData(determinedType === 'base64' ? formatBase64(dataToRender) : dataToRender);

                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: "⚠️ Conexión perdida. Mostrando datos locales de emergencia." }]);
                    setViewType(determinedType);
                    setViewData(determinedType === 'base64' ? formatBase64(dataToRender) : dataToRender);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen relative overflow-hidden z-10">
                    
                    {/* LIGHTBOX PARA IMÁGENES (No aplica a Mermaid) */}
                    {lightboxImg && viewType === 'base64' && (
                        <div className="fixed inset-0 z-[100] bg-pits-dark/95 backdrop-blur-xl flex items-center justify-center p-4 cursor-zoom-out animate-[fadeIn_0.3s_ease-out]" onClick={() => setLightboxImg(null)}>
                            <button className="absolute top-6 right-6 text-slate-400 hover:text-white bg-pits-panel border border-slate-700 p-3 rounded-full transition z-50">
                                <i className="ph-bold ph-x text-xl"></i>
                            </button>
                            <img src={lightboxImg} alt="Plano Ampliado" className="max-w-full max-h-[90vh] object-contain rounded border-4 border-white shadow-[0_0_50px_rgba(6,182,212,0.15)] bg-white p-2" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}

                    {/* HEADER TÁCTICO */}
                    <header className="glass-panel border-b-0 p-3 flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-pits-cyan/10 border border-pits-cyan/50 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                                <i className="ph-fill ph-cpu text-pits-cyan text-xl"></i>
                            </div>
                            <div>
                                <h1 className="font-display font-bold text-lg leading-none uppercase tracking-widest text-white mb-1">Infiniti Pits</h1>
                                <div className="flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-pits-cyan animate-pulse"></span>
                                    <span className="text-[10px] text-pits-cyan font-mono tracking-widest uppercase">Dual Render Engine</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onLogout} className="px-4 py-2 rounded-lg bg-pits-panel border border-pits-border text-gray-400 hover:text-white hover:border-pits-primary transition font-mono text-xs uppercase tracking-widest flex items-center gap-2">
                            <span className="hidden sm:inline">Desconectar</span>
                            <i className="ph-bold ph-sign-out text-lg"></i>
                        </button>
                    </header>

                    {/* LAYOUT PRINCIPAL */}
                    <div className="flex-1 flex flex-col lg:flex-row w-full overflow-hidden p-3 gap-4">
                        
                        {/* 1. CHAT (IZQUIERDA) */}
                        <div className="w-full lg:w-[40%] flex flex-col glass-panel rounded-2xl border border-pits-border shadow-2xl overflow-hidden shrink-0 h-[50vh] lg:h-full">
                            <div className="bg-pits-panel/80 p-3 border-b border-pits-border flex items-center gap-2 shrink-0">
                                <i className="ph-fill ph-terminal-window text-pits-cyan"></i>
                                <span className="font-mono text-[10px] text-gray-400 tracking-widest uppercase">Chat Técnico</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`flex gap-3 max-w-[95%] ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div className="flex-shrink-0 mt-1">
                                                {msg.role === 'ai' ? (
                                                    <div className="w-8 h-8 rounded-xl bg-pits-cyan/10 border border-pits-cyan/30 flex items-center justify-center text-pits-cyan shadow-[0_0_10px_rgba(6,182,212,0.2)]"><i className="ph-fill ph-robot"></i></div>
                                                ) : (
                                                    <div className="w-8 h-8 rounded-xl bg-slate-800 border border-slate-600 flex items-center justify-center text-white"><i className="ph-fill ph-wrench"></i></div>
                                                )}
                                            </div>
                                            <div className={`p-4 md:p-5 rounded-2xl text-sm leading-relaxed shadow-lg markdown-body ${msg.role === 'user' ? 'bg-pits-panel border border-slate-700 text-white rounded-tr-none' : 'bg-black/60 border border-pits-cyan/20 text-slate-200 rounded-tl-none'}`} dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}></div>
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start">
                                        <div className="flex gap-3 max-w-[75%]">
                                            <div className="w-8 h-8 rounded-xl bg-pits-cyan/10 border border-pits-cyan/30 flex items-center justify-center text-pits-cyan mt-1"><i className="ph-fill ph-robot"></i></div>
                                            <div className="p-4 rounded-2xl rounded-tl-none bg-black/60 border border-pits-cyan/20 flex items-center gap-3">
                                                <i className="ph-bold ph-circle-notch animate-spin text-pits-cyan text-lg"></i>
                                                <span className="text-xs text-gray-400 font-mono tracking-widest uppercase">Analizando Data...</span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 md:p-4 bg-pits-panel border-t border-pits-border shrink-0">
                                <div className="relative flex gap-2">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Ej: Diagrama de flujo de falla, o plano eléctrico..." className="w-full bg-pits-dark border border-pits-border rounded-xl px-4 py-4 text-sm text-white focus:outline-none focus:border-pits-cyan transition font-mono" disabled={isLoading} autoComplete="off" />
                                    <button onClick={handleSend} disabled={!input.trim() || isLoading} className="w-14 bg-pits-cyan text-pits-dark rounded-xl flex items-center justify-center hover:bg-cyan-400 transition disabled:opacity-50 shrink-0 shadow-[0_0_15px_rgba(6,182,212,0.4)]"><i className="ph-bold ph-paper-plane-right text-xl"></i></button>
                                </div>
                            </div>
                        </div>

                        {/* 2. DUAL MONITOR (DERECHA) */}
                        <div className="w-full lg:w-[60%] flex flex-col h-[50vh] lg:h-full shrink-0">
                            <div className={`flex-1 glass-panel rounded-2xl flex flex-col overflow-hidden relative shadow-[0_0_30px_rgba(6,182,212,0.05)] transition-colors duration-500 ${viewType === 'mermaid' ? 'border-pits-gold/40' : 'border-pits-cyan/40'}`}>
                                
                                {/* Header del Monitor dinámico */}
                                <div className="bg-pits-panel p-3 border-b border-pits-border flex justify-between items-center z-10 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <i className={`ph-fill text-lg ${viewType === 'mermaid' ? 'ph-tree-structure text-pits-gold' : 'ph-file-text text-pits-cyan'}`}></i>
                                        <span className={`font-mono text-[10px] tracking-widest uppercase font-bold ${viewType === 'mermaid' ? 'text-pits-gold' : 'text-pits-cyan'}`}>
                                            {viewType === 'mermaid' ? 'Monitor Flujo Lógico (Mermaid)' : 'Monitor Físico (Base64)'}
                                        </span>
                                    </div>
                                    <button onClick={() => { if(viewType === 'base64' && viewData) setLightboxImg(viewData); }} className="text-[10px] bg-slate-800 hover:bg-slate-700 text-white font-mono px-3 py-1.5 rounded transition flex items-center gap-2 uppercase tracking-widest disabled:opacity-50" disabled={viewType !== 'base64'}>
                                        <i className="ph-bold ph-arrows-out-simple"></i> Ampliar
                                    </button>
                                </div>
                                
                                {/* CONTENEDOR VISUAL */}
                                <div className={`flex-1 relative flex items-center justify-center overflow-hidden p-4 ${viewType === 'base64' ? 'diagram-bg' : 'mermaid-bg'}`}>
                                    
                                    {viewType === 'idle' && (
                                        <div className="text-center text-slate-500 font-mono flex flex-col items-center">
                                            <div className="w-20 h-20 border-2 border-dashed border-slate-600 rounded-full flex items-center justify-center mb-4">
                                                <i className="ph-thin ph-monitor text-4xl"></i>
                                            </div>
                                            <span className="text-xs uppercase tracking-widest">Esperando Comando Visual</span>
                                        </div>
                                    )}
                                    
                                    {viewType === 'loading' && (
                                        <>
                                            <div className="absolute inset-0 hud-scanline"></div>
                                            <div className="text-pits-cyan font-mono text-xs flex flex-col items-center z-10">
                                                <i className="ph-bold ph-scan animate-spin text-4xl mb-4"></i>
                                                <span className="animate-pulse tracking-[0.2em] bg-pits-dark/80 px-4 py-2 rounded">Generando Interfaz Visual...</span>
                                            </div>
                                        </>
                                    )}
                                    
                                    {/* MODO BASE 64 (Imagen) */}
                                    {viewType === 'base64' && viewData && (
                                        <div className="w-full h-full bg-white rounded-lg shadow-2xl border-2 border-slate-300 p-2 overflow-hidden flex items-center justify-center relative group cursor-zoom-in animate-[fadeIn_0.5s_ease-out]" onClick={() => setLightboxImg(viewData)}>
                                            <img src={viewData} alt="Diagrama Técnico" className="max-w-full max-h-full object-contain hover:scale-[1.02] transition-transform duration-300 mix-blend-multiply" />
                                            <div className="absolute bottom-4 right-4 bg-pits-dark/90 text-white text-[10px] font-mono px-3 py-1.5 rounded border border-pits-cyan/30 opacity-0 group-hover:opacity-100 transition-opacity">
                                                Click para ampliar
                                            </div>
                                        </div>
                                    )}

                                    {/* MODO MERMAID (Diagrama Logico interactivo) */}
                                    {viewType === 'mermaid' && viewData && (
                                        <div className="w-full h-full rounded-lg bg-black/60 shadow-2xl border border-pits-gold/20 overflow-hidden relative animate-[fadeIn_0.5s_ease-out]">
                                            <MermaidViewer code={viewData} />
                                            <div className="absolute top-4 right-4 bg-pits-gold/10 text-pits-gold text-[10px] font-mono px-3 py-1.5 rounded border border-pits-gold/30">
                                                Live Render
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLogged, setIsLogged] = useState(false);
            return (
                <React.Fragment>
                    {!isLogged ? <LoginScreen onLoginSuccess={() => setIsLogged(true)} /> : <CommandStation onLogout={() => setIsLogged(false)} />}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
