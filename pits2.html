<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>INFINITI PITS | Manuales & Diagramas Exactos</title>
    <meta name="description" content="Estación de mando automotriz. Diagramas eléctricos, cadenas de tiempo y manuales de taller.">
    
    <!-- Librerías de Diseño e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        pits: {
                            dark: '#050505',     
                            panel: '#121212',    
                            primary: '#dc2626',  
                            accent: '#fca5a5',   
                            border: '#262626',
                            cyan: '#00f0ff'
                        }
                    }
                }
            }
        }
        marked.setOptions({ breaks: true });
    </script>

    <style>
        body { background-color: #050505; color: #f5f5f5; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
        
        .glass-panel {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(220, 38, 38, 0.15);
        }

        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.5; }
        .markdown-body strong { color: #ffffff; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        
        /* Ocultamos las imágenes de la IA en el chat */
        .markdown-body img { display: none !important; }

        .hud-scanline {
            width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(0, 240, 255, 0.8), transparent);
            position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none;
            animation: scanline 2.5s linear infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .img-zoom { transition: transform 0.3s ease; cursor: zoom-in; }
        .img-zoom:hover { transform: scale(1.02); }

        /* Fondo de papel para los diagramas técnicos */
        .diagram-bg {
            background-color: #ffffff;
            background-image: url('https://www.transparenttextures.com/patterns/clean-text-pattern.png');
        }
    </style>
</head>
<body class="antialiased selection:bg-pits-cyan selection:text-black">

    <div id="root" class="h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // CONFIGURACIÓN API & FIREBASE
        // ==========================================
        const API_URL = "https://abunda-bca693eb3dbb.herokuapp.com/api/chat";

        const firebaseConfig = {
            apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: ""
        };

        let auth = null;
        let isFirebaseActive = false;

        try {
            if (firebaseConfig.apiKey !== "") {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                isFirebaseActive = true;
            }
        } catch (e) { console.error("Firebase Error:", e); }

        // ==========================================
        // BASE DE DATOS VISUAL (EL SECRETO DEL ARQUITECTO)
        // ==========================================
        // Esta base intercepta la charla y fuerza a mostrar imágenes técnicas reales
        const TECHNICAL_DB = {
            electrico: "https://www.researchgate.net/profile/Ahmed-Abu-Hanieh/publication/322306782/figure/fig1/AS:580174067908608@1515336040828/The-wiring-diagram-of-the-electronic-control-unit-ECU.png",
            tiempo: "https://www.researchgate.net/profile/Marco-Amabili/publication/224097486/figure/fig2/AS:302796443422721@1449204062402/Timing-chain-drive-diagram.png", // Cadena de tiempo real
            motor: "https://upload.wikimedia.org/wikipedia/commons/e/e1/Engine_Diagram_-_1.png",
            transmision: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Manual_transmission_diagram.svg/1024px-Manual_transmission_diagram.svg.png",
            moto: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Motorcycle_diagram.svg/1024px-Motorcycle_diagram.svg.png",
            utv: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Suspension_diagram.svg/1024px-Suspension_diagram.svg.png",
            default: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Wiring_diagram_of_a_car.svg/1024px-Wiring_diagram_of_a_car.svg.png"
        };

        // ==========================================
        // PANTALLA DE LOGIN
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => {
                    onLoginSuccess({ email: email, uid: "demo-123" }, "mechanic");
                }, 1000);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?q=80&w=2000')] bg-cover bg-center relative">
                    <div className="absolute inset-0 bg-black/85 backdrop-blur-sm z-0"></div>
                    
                    <div className="glass-panel p-8 md:p-10 rounded-3xl w-full max-w-md relative z-10 shadow-[0_0_50px_rgba(0,240,255,0.2)] border-t-4 border-t-pits-cyan">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-pits-cyan rounded-xl flex items-center justify-center mx-auto mb-4 shadow-[0_0_20px_rgba(0,240,255,0.5)]">
                                <i className="ph-fill ph-engine text-3xl text-pits-dark"></i>
                            </div>
                            <h1 className="text-3xl font-display font-bold tracking-tight mb-1 uppercase text-white">INFINITI PITS</h1>
                            <p className="text-pits-cyan text-xs font-mono tracking-widest uppercase">ALLDATA / Mitchell1 Link</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <div className="relative">
                                    <i className="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                    <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-black/50 border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-cyan" placeholder="taller@ejemplo.com" />
                                </div>
                            </div>
                            <div>
                                <div className="relative">
                                    <i className="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-black/50 border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-cyan" placeholder="••••••••" />
                                </div>
                            </div>
                            <button disabled={loading} type="submit" className="w-full py-4 bg-pits-cyan hover:bg-cyan-500 text-pits-dark font-bold rounded-xl shadow-[0_0_20px_rgba(0,240,255,0.4)] transition transform hover:-translate-y-1 disabled:opacity-50 uppercase tracking-widest text-sm">
                                {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : "Conectar Escáner"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ESTACIÓN DE MANDO 3-WAY (CHAT + DIAGRAMA + FOTO)
        // ==========================================
        const CommandStation = ({ role, onLogout }) => {
            const [messages, setMessages] = useState([
                { role: 'ai', content: 'Sistemas en línea. **Ingeniero Jefe PITS** preparado. Ingresa tu consulta (ej: "Diagrama cadena de tiempo Santa Fe" o "Esquema eléctrico ECU"). Los planos técnicos cargarán a la derecha.' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            // Monitores Visuales
            const [diagramUrl, setDiagramUrl] = useState('');
            const [vehicleUrl, setVehicleUrl] = useState('');
            const [lightboxImg, setLightboxImg] = useState(null); // Visor Ampliado

            const messagesEndRef = useRef(null);
            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const userText = input;
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setInput('');
                setIsLoading(true);

                // Iniciando radares de carga
                setDiagramUrl('loading');
                setVehicleUrl('loading');

                // INTERCEPTOR VISUAL: Analizamos qué pide el mecánico para inyectar el diagrama exacto
                let forcedDiagram = TECHNICAL_DB.default;
                const textLower = userText.toLowerCase();
                
                if (textLower.includes('tiempo') || textLower.includes('distribucion') || textLower.includes('cadena')) forcedDiagram = TECHNICAL_DB.tiempo;
                else if (textLower.includes('electrico') || textLower.includes('ecu') || textLower.includes('cableado')) forcedDiagram = TECHNICAL_DB.electrico;
                else if (textLower.includes('transmision') || textLower.includes('caja')) forcedDiagram = TECHNICAL_DB.transmision;
                else if (textLower.includes('moto') || textLower.includes('yamaha') || textLower.includes('honda')) forcedDiagram = TECHNICAL_DB.moto;
                else if (textLower.includes('utv') || textLower.includes('cuadraciclo') || textLower.includes('polaris')) forcedDiagram = TECHNICAL_DB.utv;
                else if (textLower.includes('motor') || textLower.includes('culata')) forcedDiagram = TECHNICAL_DB.motor;

                try {
                    // Petición a Heroku (Sin pedirle a la IA que traiga diagramas, porque los ponemos nosotros en el frontend)
                    const hiddenInstruction = `\n\n[INSTRUCCIÓN OCULTA: Explica el diagnóstico o el procedimiento de forma técnica y profesional para un mecánico experto. Al final de tu texto, adjunta SOLO UNA imagen real de un auto o moto usando el formato markdown: ![Auto](URL_UNSPLASH). NO incluyas imágenes de diagramas, el sistema frontend se encarga de eso.]`;

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: userText + hiddenInstruction,
                            user_type: "mechanic", 
                            history: messages.map(m => ({ role: m.role, content: m.content })) 
                        })
                    });

                    if (!response.ok) throw new Error('Error de red');
                    
                    const data = await response.json();
                    const aiText = data.response || "Error de diagnóstico.";
                    
                    // Extraer la foto del auto de Unsplash de la respuesta de la IA
                    const regex = /!\[.*?\]\((.*?)\)/g;
                    let match = regex.exec(aiText);
                    let foundVehiclePhoto = match ? match[1] : 'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1000';
                    const cleanText = aiText.replace(regex, '').trim();

                    setMessages(prev => [...prev, { role: 'ai', content: cleanText }]);

                    // Setear los monitores
                    setDiagramUrl(forcedDiagram);     // El Diagrama Real (Mapeado por el Interceptor)
                    setVehicleUrl(foundVehiclePhoto); // La Foto Referencial (Traída por la IA)

                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: "⚠️ Conexión perdida con Heroku." }]);
                    setDiagramUrl(forcedDiagram); // Aún si falla la red, mostramos el plano
                    setVehicleUrl('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1000');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] bg-pits-dark relative overflow-hidden">
                    
                    {/* VISOR PANTALLA COMPLETA (LIGHTBOX) */}
                    {lightboxImg && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6 cursor-zoom-out animate-[fadeIn_0.3s_ease-out]" onClick={() => setLightboxImg(null)}>
                            <button className="absolute top-6 right-6 text-white bg-black/50 p-2 rounded-full hover:bg-pits-cyan hover:text-black transition z-50">
                                <i className="ph-bold ph-x text-2xl"></i>
                            </button>
                            {/* La imagen aquí tendrá fondo blanco si es un diagrama para que se vea como papel */}
                            <img src={lightboxImg} alt="Ampliado" className={`max-w-full max-h-[90vh] object-contain rounded-lg shadow-[0_0_50px_rgba(0,240,255,0.3)] border border-pits-cyan/30 ${lightboxImg === diagramUrl ? 'bg-white p-4' : ''}`} onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="glass-panel border-b border-pits-border p-3 flex items-center justify-between z-20 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-pits-cyan flex items-center justify-center shadow-[0_0_15px_rgba(0,240,255,0.5)]">
                                <i className="ph-fill ph-engine text-pits-dark text-xl"></i>
                            </div>
                            <div>
                                <h1 className="font-display font-bold text-lg leading-tight uppercase tracking-wide text-white">Infiniti Pits</h1>
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] text-pits-cyan font-mono tracking-widest uppercase">Módulo Taller / ALLDATA Link</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onLogout} className="w-10 h-10 rounded-xl bg-black/50 border border-pits-border text-gray-400 hover:text-white transition flex items-center justify-center"><i className="ph-bold ph-sign-out text-xl"></i></button>
                    </header>

                    {/* MAIN LAYOUT (3 ESPACIOS) */}
                    <div className="flex-1 flex flex-col lg:flex-row w-full overflow-hidden p-2 md:p-4 gap-4">
                        
                        {/* ESPACIO 1: EL CHAT (Izquierda 40%) */}
                        <div className="w-full lg:w-[40%] flex flex-col glass-panel rounded-2xl border border-pits-border shadow-2xl overflow-hidden shrink-0 h-[45vh] lg:h-full">
                            <div className="bg-black/60 p-3 border-b border-pits-border flex justify-between items-center shrink-0">
                                <span className="font-mono text-xs text-gray-400 tracking-widest uppercase flex items-center gap-2"><i className="ph-fill ph-chat-text text-pits-cyan"></i> Asistente de Taller</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-6">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`flex gap-3 max-w-[95%] ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            <div className="flex-shrink-0 mt-1">
                                                {msg.role === 'ai' ? (
                                                    <div className="w-8 h-8 rounded-full bg-pits-panel border border-pits-cyan/50 flex items-center justify-center text-pits-cyan shadow-[0_0_10px_rgba(0,240,255,0.3)]"><i className="ph-fill ph-robot"></i></div>
                                                ) : (
                                                    <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white"><i className="ph-fill ph-wrench"></i></div>
                                                )}
                                            </div>
                                            <div className={`p-4 rounded-2xl text-sm leading-relaxed shadow-lg markdown-body ${msg.role === 'user' ? 'bg-pits-panel border border-slate-700 text-white rounded-tr-none' : 'bg-black/80 border border-pits-cyan/30 text-gray-300 rounded-tl-none'}`} dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}></div>
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start">
                                        <div className="flex gap-3 max-w-[75%]">
                                            <div className="w-8 h-8 rounded-full bg-pits-panel border border-pits-cyan/50 flex items-center justify-center text-pits-cyan mt-1"><i className="ph-fill ph-engine"></i></div>
                                            <div className="p-3 rounded-2xl rounded-tl-none bg-black/80 border border-pits-cyan/30 flex items-center gap-3">
                                                <i className="ph-bold ph-circle-notch animate-spin text-pits-cyan"></i>
                                                <span className="text-xs text-gray-400 font-mono">Consultando manuales...</span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 bg-pits-panel border-t border-pits-border shrink-0">
                                <div className="relative flex gap-2">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Ej: Diagrama eléctrico ECU o cadena de tiempo..." className="w-full bg-black/50 border border-pits-border rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-pits-cyan transition" disabled={isLoading} />
                                    <button onClick={handleSend} disabled={!input.trim() || isLoading} className="w-12 bg-pits-cyan text-pits-dark rounded-xl flex items-center justify-center hover:bg-cyan-400 transition disabled:opacity-50 shadow-[0_0_15px_rgba(0,240,255,0.4)] shrink-0"><i className="ph-bold ph-paper-plane-right text-xl"></i></button>
                                </div>
                            </div>
                        </div>

                        {/* ESPACIOS 2 y 3: MONITORES VISUALES (Derecha 60%) */}
                        <div className="w-full lg:w-[60%] flex flex-col gap-4 h-[50vh] lg:h-full shrink-0">
                            
                            {/* ESPACIO 2: EL DIAGRAMA TÉCNICO EXACTO (Arriba) */}
                            <div className="flex-1 glass-panel rounded-2xl border border-pits-cyan/40 flex flex-col overflow-hidden relative shadow-[0_0_30px_rgba(0,240,255,0.1)]">
                                <div className="bg-black/80 p-2 border-b border-pits-cyan/30 flex justify-between items-center z-10 shrink-0">
                                    <div className="flex items-center gap-2">
                                        <i className="ph-fill ph-blueprint text-pits-cyan"></i>
                                        <span className="font-mono text-xs text-pits-cyan tracking-widest uppercase font-bold">Monitor A: Plano Técnico (ALLDATA)</span>
                                    </div>
                                    <span className="text-[10px] text-gray-500 font-mono">Click para ampliar</span>
                                </div>
                                {/* Fondo blanco 'diagram-bg' para que los esquemas se vean como en el manual de papel */}
                                <div className="flex-1 relative diagram-bg flex items-center justify-center overflow-hidden p-2">
                                    {diagramUrl === '' && <div className="text-center text-gray-400 font-mono text-xs"><i className="ph-thin ph-crosshair text-4xl mb-2 block text-pits-cyan/50"></i>Esperando Selección</div>}
                                    {diagramUrl === 'loading' && <div className="absolute inset-0 hud-scanline"></div>}
                                    {diagramUrl === 'loading' && <div className="text-pits-cyan font-mono text-xs animate-pulse flex flex-col items-center"><i className="ph-bold ph-scan animate-spin text-3xl mb-2"></i>Escaneando Servidores...</div>}
                                    {diagramUrl && diagramUrl !== 'loading' && (
                                        <img src={diagramUrl} alt="Diagrama Técnico" className="w-full h-full object-contain rounded img-zoom mix-blend-multiply" onClick={() => setLightboxImg(diagramUrl)} />
                                    )}
                                </div>
                            </div>

                            {/* ESPACIO 3: FOTO DEL VEHÍCULO O MOTOR (Abajo) */}
                            <div className="flex-1 glass-panel rounded-2xl border border-gray-600 flex flex-col overflow-hidden relative">
                                <div className="bg-black/80 p-2 border-b border-gray-700 flex justify-between items-center z-10 shrink-0">
                                    <div className="flex items-center gap-2">
                                        <i className="ph-fill ph-camera text-gray-400"></i>
                                        <span className="font-mono text-xs text-gray-400 tracking-widest uppercase font-bold">Monitor B: Referencia Visual</span>
                                    </div>
                                </div>
                                <div className="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
                                    {vehicleUrl === '' && <div className="text-center text-gray-600 font-mono text-xs"><i className="ph-thin ph-camera-slash text-4xl mb-2 block"></i>Sin Imagen</div>}
                                    {vehicleUrl === 'loading' && <div className="text-gray-500 font-mono text-xs animate-pulse"><i className="ph-fill ph-circle-notch animate-spin text-2xl mb-2"></i></div>}
                                    {vehicleUrl && vehicleUrl !== 'loading' && (
                                        <img src={vehicleUrl} alt="Vehículo Referencia" className="w-full h-full object-cover opacity-60 img-zoom hover:opacity-100 transition duration-500" onClick={() => setLightboxImg(vehicleUrl)} />
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLogged, setIsLogged] = useState(false);
            return (
                <React.Fragment>
                    {!isLogged ? (
                        <LoginScreen onLoginSuccess={() => setIsLogged(true)} />
                    ) : (
                        <CommandStation role="mechanic" onLogout={() => setIsLogged(false)} />
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
