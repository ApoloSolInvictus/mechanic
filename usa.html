<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ========================================== -->
    <!-- 🚀 QUANTUM SEO & INTERNATIONAL METADATA    -->
    <!-- ========================================== -->
    <title>INFINITI PITS | Professional Automotive AI</title>
    <meta name="description" content="The first AI Chief Engineer for auto repair shops and vehicle owners. Instant OBD2 diagnostics, torque specs, and ALLDATA level manuals.">
    <meta name="keywords" content="Automotive AI, AI mechanic, OBD2 scanner, torque specs, repair manuals, Infiniti Pits, auto repair software, ALLDATA, USA">
    <meta name="author" content="Apollo Sol Invictus - W Studio">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pits.infiniti-ia.com/usa.html">

    <!-- Open Graph / Facebook / WhatsApp (Generates preview with image) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pits.infiniti-ia.com/usa.html">
    <meta property="og:title" content="INFINITI PITS | The Brain of your Auto Repair Shop">
    <meta property="og:description" content="Speed up your diagnostic time. Instant access to torque specs, manuals, and advanced OBD2 troubleshooting.">
    <meta property="og:image" content="https://pits.infiniti-ia.com/images3/seo-pits1.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="INFINITI PITS by W Studio">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="INFINITI PITS | Automotive AI">
    <meta name="twitter:description" content="Instant OBD2 diagnostics, torque specs, and workshop manuals. The AI assistant for mechanics.">
    <meta name="twitter:image" content="https://pits.infiniti-ia.com/images3/seo-pits1.jpg">

    <!-- ========================================== -->
    <!-- 🚀 OFFICIAL FAVICONS                       -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" sizes="96x96" href="my-favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="my-favicon/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="my-favicon/favicon.svg">
    <link rel="shortcut icon" href="my-favicon/favicon.ico">
    <link rel="manifest" href="my-favicon/site.webmanifest">

    <!-- Design Libraries & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        pits: {
                            dark: '#0a0a0a',     
                            panel: '#171717',    
                            primary: '#dc2626',  
                            accent: '#fca5a5',   
                            text: '#f5f5f5',
                            border: '#262626'
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 10px rgba(220, 38, 38, 0.2)' },
                            '50%': { boxShadow: '0 0 20px rgba(220, 38, 38, 0.6)' },
                        },
                        fadeIn: {
                            '0%': { opacity: 0, transform: 'translateY(10px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 4px; }
        
        .glass-panel {
            background: rgba(23, 23, 23, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(220, 38, 38, 0.15);
        }
    </style>
</head>
<body class="antialiased selection:bg-pits-primary selection:text-white">

    <div id="root" class="min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // SOBERANO: Insert your Firebase credentials here
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDNSg33pfmXx4yPdsr_u6-tX7pukAQbvn4", 
            authDomain: "pits-382a0.firebaseapp.com",
            projectId: "pits-382a0",
            storageBucket: "pits-382a0.firebasestorage.app",
            messagingSenderId: "828002449733",
            appId: "1:828002449733:web:69a5738bab59a3c52ce62c"
        };

        let auth = null;
        let isFirebaseActive = false;

        try {
            if (firebaseConfig.apiKey !== "") {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                isFirebaseActive = true;
            }
        } catch (e) { console.error("Firebase Error:", e); }

        // ==========================================
        // 2. LOGIN SCREEN (SALES BRIDGE & ROLE SELECTION)
        // ==========================================
        const LoginScreen = ({ onLoginSuccess }) => {
            const [selectedRole, setSelectedRole] = useState("mechanic"); // Default to mechanic
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                try {
                    if (isFirebaseActive) {
                        const userCredential = await auth.signInWithEmailAndPassword(email, password);
                        onLoginSuccess(userCredential.user, selectedRole);
                    } else {
                        // DEMO/BYPASS MODE (If Firebase is not configured)
                        if (email.includes("@")) {
                            setTimeout(() => {
                                onLoginSuccess({ email: email, uid: "demo-123" }, selectedRole);
                            }, 1000);
                        } else {
                            setError("Please enter a valid email address.");
                            setLoading(false);
                        }
                    }
                } catch (err) {
                    setError("Incorrect credentials or unregistered user.");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[url('images3/portada.jpg')] bg-cover bg-center relative">
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm z-0"></div>
                    
                    <div className="glass-panel p-8 md:p-10 rounded-3xl w-full max-w-md relative z-10 shadow-2xl animate-fade-in border-t-2 border-t-pits-primary">
                        
                        <div className="text-center mb-8">
                            <img src="images3/A Mark Small.png" alt="Infiniti Logo" className="w-16 h-16 mx-auto mb-4 object-contain" />
                            <h1 className="text-3xl font-display font-bold tracking-tight mb-1 uppercase">INFINITI PITS</h1>
                            <p className="text-pits-accent text-xs font-mono tracking-widest uppercase">Authorized Access</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5">
                            
                            {/* ROLE SELECTION TOGGLE */}
                            <div className="flex bg-black/50 p-1 rounded-xl mb-6 border border-pits-border">
                                <button
                                    type="button"
                                    onClick={() => setSelectedRole('mechanic')}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition duration-300 ${selectedRole === 'mechanic' ? 'bg-pits-primary text-white shadow-[0_0_10px_rgba(220,38,38,0.5)]' : 'text-gray-500 hover:text-white'}`}
                                >
                                    <i className="ph-fill ph-wrench mr-1"></i> Mechanic
                                </button>
                                <button
                                    type="button"
                                    onClick={() => setSelectedRole('owner')}
                                    className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition duration-300 ${selectedRole === 'owner' ? 'bg-blue-600 text-white shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'text-gray-500 hover:text-white'}`}
                                >
                                    <i className="ph-fill ph-car-profile mr-1"></i> Car Owner
                                </button>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Email Address</label>
                                <div className="relative">
                                    <i className="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                    <input 
                                        type="email" required value={email} onChange={e=>setEmail(e.target.value)} 
                                        className="w-full bg-black/50 border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-primary focus:ring-1 focus:ring-pits-primary transition"
                                        placeholder="shop@example.com"
                                    />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Password</label>
                                <div className="relative">
                                    <i className="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                                    <input 
                                        type="password" required value={password} onChange={e=>setPassword(e.target.value)} 
                                        className="w-full bg-black/50 border border-pits-border rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pits-primary focus:ring-1 focus:ring-pits-primary transition"
                                        placeholder="••••••••"
                                    />
                                </div>
                            </div>

                            {error && <div className="p-3 bg-red-900/30 border border-red-500/50 rounded-lg text-xs text-red-400 text-center font-mono">{error}</div>}

                            <button disabled={loading} type="submit" className="w-full py-4 bg-pits-primary hover:bg-red-700 text-white font-bold rounded-xl shadow-lg shadow-pits-primary/30 hover:shadow-pits-primary/50 transition transform hover:-translate-y-1 disabled:opacity-50 uppercase tracking-widest text-sm">
                                {loading ? <i className="ph ph-spinner-gap animate-spin text-xl"></i> : "Log In"}
                            </button>
                        </form>

                        {/* SALES CALL TO ACTION */}
                        <div className="mt-8 pt-6 border-t border-pits-border text-center">
                            <p className="text-sm text-gray-400 mb-4">Don't have an account? Join the mechanical elite for just <strong className="text-white">$3.00 / month</strong>.</p>
                            <a href="ventas.html" className="inline-flex w-full items-center justify-center py-3 bg-transparent border border-pits-primary text-pits-primary hover:bg-pits-primary hover:text-white font-bold rounded-xl transition duration-300 uppercase tracking-widest text-xs gap-2">
                                <i className="ph-fill ph-star"></i> Subscribe Now
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. CHAT INTERFACE
        // ==========================================
        const ChatInterface = ({ role, onLogout }) => {
            const [messages, setMessages] = useState([
                { 
                    role: 'ai', 
                    content: role === 'mechanic' 
                        ? 'System Online. **Chief Engineer PITS** ready. Accessing ALLDATA, Mitchell 1, and European/JDM databases. Enter your fault code (e.g. P0300), request torque specs, or wiring diagrams.'
                        : 'Hello! I am your Automotive AI Assistant. Did a warning light come on your dashboard? Need a maintenance tip for your car or motorcycle? Tell me the symptoms in plain English.'
                }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const userText = input;
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setInput('');
                setIsLoading(true);

                try {
                    const API_URL = "https://abunda-bca693eb3dbb.herokuapp.com/api/chat";

                    const mechanicPrompt = `
                        YOU ARE: INFINITI PITS, the AI Chief Engineer and Master Mechanic for professional repair shops.
                        SIMULATED DATABASE: ALLDATA, Mitchell 1, European Manuals (BMW, Audi, Mercedes), and Motorcycles/UTVs.
                        USER: A Professional Mechanic in their shop.
                        MISSION: Provide deep technical diagnostics, exact torque specifications, wiring guides, and advanced DTC (OBD2) resolution.
                        TONE: Professional, highly technical, direct. Treat the user as a colleague. Use bold text and lists. Language: English.
                        
                        Mechanic's Query: ${userText}
                    `;

                    const ownerPrompt = `
                        YOU ARE: INFINITI PITS, the expert automotive AI assistant for a standard vehicle owner.
                        MISSION: Explain mechanical breakdowns, dashboard warning lights, and maintenance clearly, without overly complex technical jargon.
                        TONE: Friendly, patient, educational. If it is dangerous (brakes, steering), advise going to a repair shop and explain exactly what they should tell the mechanic. Language: English.
                        
                        Owner's Query: ${userText}
                    `;

                    const systemPrompt = role === 'mechanic' ? mechanicPrompt : ownerPrompt;

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: systemPrompt, history: [] })
                    });

                    if (!response.ok) throw new Error('Network Error');
                    
                    const data = await response.json();
                    let formattedResponse = data.response || data.text || "Diagnostic error. Please try again.";
                    
                    setMessages(prev => [...prev, { role: 'ai', content: formattedResponse }]);

                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: "⚠️ Connection lost to the main matrix. Please check your internet." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] bg-pits-dark">
                    <header className="glass-panel border-b border-pits-border p-4 flex items-center justify-between z-20 sticky top-0">
                        <div className="flex items-center gap-3">
                            <img src="images3/A Mark Small.png" alt="Logo" className="w-10 h-10 object-contain drop-shadow-[0_0_10px_rgba(220,38,38,0.5)]" />
                            <div>
                                <h1 className="font-display font-bold text-lg leading-tight uppercase tracking-wide text-white">Infiniti Pits</h1>
                                <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    <span className="text-[10px] text-gray-400 font-mono tracking-widest uppercase">Online</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <div className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border hidden sm:block ${role === 'mechanic' ? 'bg-red-500/10 text-red-400 border-red-500/30' : 'bg-blue-500/10 text-blue-400 border-blue-500/30'}`}>
                                {role === 'mechanic' ? 'Pro Mode' : 'Owner Mode'}
                            </div>
                            <button onClick={onLogout} className="w-10 h-10 rounded-xl bg-black/50 border border-pits-border text-gray-400 hover:text-white hover:border-red-500 transition flex items-center justify-center" title="Log Out">
                                <i className="ph-bold ph-sign-out text-xl"></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`flex gap-3 max-w-[90%] md:max-w-[75%] ${msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                    <div className="flex-shrink-0 mt-1">
                                        {msg.role === 'ai' ? (
                                            <div className="w-8 h-8 rounded-full bg-pits-panel border border-pits-border flex items-center justify-center text-pits-primary shadow-[0_0_10px_rgba(220,38,38,0.3)]">
                                                <i className="ph-fill ph-engine"></i>
                                            </div>
                                        ) : (
                                            <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white">
                                                <i className="ph-fill ph-user"></i>
                                            </div>
                                        )}
                                    </div>

                                    <div className={`p-4 rounded-2xl text-sm leading-relaxed shadow-lg ${
                                        msg.role === 'user' 
                                        ? 'bg-pits-panel border border-slate-700 text-white rounded-tr-none' 
                                        : 'bg-black/60 border border-pits-primary/30 text-gray-200 rounded-tl-none'
                                    }`}>
                                        {msg.content.split('\n').map((line, i) => (
                                            <p key={i} className="mb-2 last:mb-0" dangerouslySetInnerHTML={{__html: line.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')}}></p>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="flex gap-3 max-w-[75%]">
                                    <div className="w-8 h-8 rounded-full bg-pits-panel border border-pits-border flex items-center justify-center text-pits-primary shadow-[0_0_10px_rgba(220,38,38,0.3)] mt-1"><i className="ph-fill ph-engine"></i></div>
                                    <div className="p-4 rounded-2xl rounded-tl-none bg-black/60 border border-pits-primary/30 flex items-center gap-3">
                                        <i className="ph-bold ph-circle-notch animate-spin text-pits-primary"></i>
                                        <span className="text-xs text-gray-400 font-mono">Querying manuals...</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    <footer className="p-4 bg-pits-panel border-t border-pits-border z-20">
                        <div className="max-w-4xl mx-auto relative flex gap-2">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && handleSend()}
                                placeholder={role === 'mechanic' ? "Ex: Nissan QR25DE cylinder head torque specs..." : "Ex: My Check Engine light came on..."}
                                className="w-full bg-black/50 border border-pits-border rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:border-pits-primary transition"
                                disabled={isLoading}
                            />
                            <button
                                onClick={handleSend}
                                disabled={!input.trim() || isLoading}
                                className="w-14 bg-pits-primary text-white rounded-xl flex items-center justify-center hover:bg-red-600 transition disabled:opacity-50 shadow-[0_0_15px_rgba(220,38,38,0.4)] shrink-0"
                            >
                                <i className="ph-bold ph-paper-plane-right text-xl"></i>
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        // ==========================================
        // MAIN APP
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);

            useEffect(() => {
                const savedRole = localStorage.getItem('infiniti_pits_us_role');
                if (savedRole) setRole(savedRole);
                
                if (isFirebaseActive && auth) {
                    const unsubscribe = auth.onAuthStateChanged((u) => {
                        if (u) setUser(u);
                    });
                    return () => unsubscribe();
                }
            }, []);

            const handleLoginSuccess = (userData, selectedRole) => {
                localStorage.setItem('infiniti_pits_us_role', selectedRole);
                setRole(selectedRole);
                setUser(userData);
            };

            const handleLogout = async () => {
                if (isFirebaseActive && auth) await auth.signOut();
                localStorage.removeItem('infiniti_pits_us_role');
                setRole(null);
                setUser(null);
            };

            return (
                <React.Fragment>
                    {!user ? (
                        <LoginScreen onLoginSuccess={handleLoginSuccess} />
                    ) : (
                        <ChatInterface role={role} onLogout={handleLogout} />
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
